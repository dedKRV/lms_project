{% extends "base.html" %}
{% block title %}Редактировать курс{% endblock %}

{% block content %}
<h2>Редактировать курс</h2>

<div class="card" style="max-width:500px;">
<form method="POST">
    <label>Название курса</label>
    <input type="text" name="title" value="{{ course.title }}" required>

    <label>Описание</label>
    <textarea name="description" rows="5" required>{{ course.description }}</textarea>

    <br><br>
    <button class="btn btn-primary">Обновить курс</button>
    <a href="/teacher/courses" class="btn btn-secondary">Отмена</a>
</form>
</div>
{% endblock %}
