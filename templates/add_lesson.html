{% extends "base.html" %}

{% block title %}Добавить урок{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-3">Добавить урок</h2>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Название урока</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Содержание урока</label>
                        <textarea name="content" rows="6" class="form-control" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Добавить урок</button>
                </form>
            </div>
        </div>
        <br>
        <a href="/course/{{ course.id }}"><i class="bi bi-arrow-left"></i> Назад к курсу</a>
    </div>
</div>
{% endblock %}
