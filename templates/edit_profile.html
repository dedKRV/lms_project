{% extends "base.html" %}

{% block title %}Редактировать профиль{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2 class="mb-4">Редактирование профиля</h2>

        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Имя</label>
                        <input type="text" name="name" value="{{ user.name or '' }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" value="{{ user.email }}" class="form-control" disabled>
                        <small class="text-muted">Email изменить нельзя</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Дата рождения</label>
                        <input type="date" name="birth_date" value="{{ user.birth_date.strftime('%Y-%m-%d') if user.birth_date else '' }}" class="form-control" max="{{ now.strftime('%Y-%m-%d') }}">
                        <small class="text-muted">Выберите дату рождения</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Роль</label>
                        <input type="text" value="{{ 'Преподаватель' if user.role == 'teacher' else 'Студент' }}" class="form-control" disabled>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg"></i> Сохранить
                        </button>
                        <a href="/profile" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
