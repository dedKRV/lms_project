{% extends "base.html" %}

{% block title %}Мои курсы{% endblock %}

{% block content %}
<h2 class="page-title">Мои курсы</h2>

<div class="row">
    {% for course in courses %}
        <div class="col-md-6 col-lg-4 mb-3">
            <div class="card h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title course-title">
                        <a href="/course/{{ course.id }}">
                            {{ course.title }}
                        </a>
                    </h5>
                    <p class="card-text text-muted flex-grow-1">
                        {{ course.description }}
                    </p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="badge bg-success">Записан</span>
                        <span class="badge bg-primary">Баллы: {{ course.display_score }}</span>
                    </div>
                </div>
            </div>
        </div>
    {% else %}
        <div class="col-12">
            <div class="alert alert-info text-center">Вы пока не записаны ни на один курс.</div>
        </div>
    {% endfor %}
</div>
{% endblock %}
