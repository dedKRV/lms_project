{% extends "base.html" %}

{% block title %}Записать студента{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-3">Записать студента на курс</h2>

        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ course.title }}</h5>
                <p class="card-text text-muted">{{ course.description }}</p>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <form method="POST" id="enrollForm">
                    <div class="mb-3">
                        <label class="form-label">Email студента</label>
                        <input type="email" name="email" id="studentEmail" class="form-control" placeholder="Введите email студента" required autocomplete="off">
                        <div id="searchResult" class="mt-2"></div>
                    </div>
                    <div id="submitSection" style="display: none;">
                        <input type="hidden" name="confirm" value="yes">
                        <button type="submit" class="btn btn-success">Записать студента на курс</button>
                    </div>
                    <a href="/teacher/courses" class="btn btn-outline-secondary mt-2">Назад к курсам</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
let searchTimeout;
let foundStudent = null;

document.getElementById('studentEmail').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const email = this.value.trim();
    const resultDiv = document.getElementById('searchResult');
    const submitSection = document.getElementById('submitSection');

    if (email.length < 3) {
        resultDiv.innerHTML = '';
        submitSection.style.display = 'none';
        foundStudent = null;
        return;
    }

    searchTimeout = setTimeout(() => {
        resultDiv.innerHTML = '<div class="text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Поиск...</div>';

        fetch(`/api/search-student?email=${encodeURIComponent(email)}`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    resultDiv.innerHTML = `<div class="alert alert-danger py-2">${data.error}</div>`;
                    submitSection.style.display = 'none';
                    foundStudent = null;
                } else {
                    foundStudent = data;
                    resultDiv.innerHTML = `
                        <div class="alert alert-success py-2">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>Найден:</strong> ${data.name} (${data.email})
                                </div>
                                <a href="/profile/${data.id}" target="_blank" class="btn btn-outline-success btn-sm">
                                    <i class="bi bi-person"></i> Профиль
                                </a>
                            </div>
                        </div>
                    `;
                    submitSection.style.display = 'block';
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger py-2">Ошибка поиска</div>';
                submitSection.style.display = 'none';
                foundStudent = null;
            });
    }, 500);
});

document.getElementById('enrollForm').addEventListener('submit', function(e) {
    const email = document.getElementById('studentEmail').value.trim();
    if (!foundStudent || foundStudent.email !== email) {
        e.preventDefault();
        alert('Дождитесь подтверждения поиска студента');
    }
});
</script>
{% endblock %}
